<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning HTML description & title tags</title>
    <meta name="description" content="This is a description of my webpage. It will show up in search engine results and should give a brief overview of what the page is about.">
    <style>
        h1 {
            color: darkorchid;
            /* text-decoration: underline; */
            text-decoration: overline;
        }
    </style>
</head>
<body>
    <h1>Hello Marcelo</h1>
</body>
</html>
